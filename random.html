<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Definition Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* THEME VARIABLES */

:root{
--bg:#0f1117;
--card:#161b22;
--text:#e6edf3;

--neon:#00f5ff;
--neon2:#ff2bd6;

--soft:#9aa4b2;
}

body.light{
--bg:#f4f6fb;
--card:#ffffff;
--text:#1f2933;

--neon:#0066ff;
--neon2:#b400ff;

--soft:#667085;
}

/* RESET */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

/* BODY */

body{

font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;

background:var(--bg);
color:var(--text);

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:16px;

}

/* CARD */

.container{

width:100%;
max-width:420px;

background:var(--card);

border-radius:18px;

padding:26px;

box-shadow:
0 0 20px rgba(0,245,255,.08),
0 10px 35px rgba(0,0,0,.45);

}

/* HEADER */

.header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:16px;

}

.title{
font-size:13px;
letter-spacing:1px;
text-transform:uppercase;
color:var(--soft);
}

.score{
font-weight:700;
color:var(--neon);
}

/* WORD */

.word{

font-size:34px;
font-weight:800;

text-align:center;

margin:20px 0;

text-shadow:0 0 12px rgba(0,245,255,.4);

}

/* OPTIONS */

.options{

display:flex;
flex-direction:column;

gap:12px;

margin-top:10px;

}

.option{

background:rgba(255,255,255,.04);

border-radius:12px;

padding:14px;

cursor:pointer;

border:1px solid rgba(255,255,255,.06);

transition:all .15s;

}

.option:hover{

border-color:var(--neon);

box-shadow:0 0 10px rgba(0,245,255,.3);

}

.option.correct{

border-color:#00ff9c;
box-shadow:0 0 14px #00ff9c;

}

.option.wrong{

border-color:#ff3c6f;
box-shadow:0 0 14px #ff3c6f;

}

/* THEME BUTTON */

.theme-btn{

background:none;
border:1px solid rgba(255,255,255,.15);
color:var(--text);

border-radius:8px;

padding:6px 10px;

font-size:12px;

cursor:pointer;

}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="title">Definition Game</div>

<div>

<span class="score">Score: <span id="score">0</span></span>

<button class="theme-btn" onclick="toggleTheme()">☀︎/🌙</button>

</div>

</div>

<div id="word" class="word">Loading...</div>

<div id="options" class="options"></div>

</div>

<script>

const MIN_RANK = 10000;
const MAX_RANK = 15000;

let wordsData = {};
let definitions = [];

let filteredWords = [];

let score = 0;

async function init(){

const wordsResponse = await fetch("words.json");
wordsData = await wordsResponse.json();

const defsResponse = await fetch("definitions.json");
definitions = await defsResponse.json();

filteredWords = Object.entries(wordsData)
.filter(([word,rank]) => rank >= MIN_RANK && rank <= MAX_RANK);

nextRound();

}

function getRandom(arr){

return arr[Math.floor(Math.random()*arr.length)];

}

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];

}

return array;

}

function findDefinition(word){

word = word.toUpperCase();

return definitions.find(d=>d.searched_word===word);

}

function getRandomWrongDefinitions(correctWord){

let wrong=[];

while(wrong.length<3){

let candidate=getRandom(definitions);

if(candidate.searched_word!==correctWord){

wrong.push(candidate);

}

}

return wrong;

}

function nextRound(){

const randomWord = getRandom(filteredWords);

const word = randomWord[0];

document.getElementById("word").textContent = word;

const correctEntry = findDefinition(word);

if(!correctEntry){

nextRound();
return;

}

const correctDefinition = correctEntry.definition[0];

const wrongEntries = getRandomWrongDefinitions(word);

const options = [
{ text: correctDefinition, correct:true },
...wrongEntries.map(w=>({ text:w.definition[0], correct:false }))
];

shuffle(options);

renderOptions(options);

}

function renderOptions(options){

const container=document.getElementById("options");

container.innerHTML="";

options.forEach(opt=>{

const div=document.createElement("div");

div.className="option";

div.textContent=opt.text;

div.onclick=()=>selectOption(div,opt.correct);

container.appendChild(div);

});

}

function selectOption(element,correct){

const options=document.querySelectorAll(".option");

options.forEach(o=>o.onclick=null);

if(correct){

element.classList.add("correct");

score++;

}else{

element.classList.add("wrong");

score=0;

}

document.getElementById("score").textContent=score;

setTimeout(nextRound,1200);

}

function toggleTheme(){

document.body.classList.toggle("light");

}

init();

</script>

</body>
</html>
