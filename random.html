<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Trainer</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* THEME VARIABLES */

:root{

--bg:#0f1117;
--card:#161b22;
--text:#e6edf3;

--neon:#00f5ff;
--neon2:#ff2bd6;

--soft:#9aa4b2;

}

/* LIGHT THEME */

body.light{

--bg:#f4f6fb;
--card:#ffffff;
--text:#1f2933;

--neon:#0066ff;
--neon2:#b400ff;

--soft:#667085;

}

/* RESET */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

/* BODY */

body{

font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;

background:var(--bg);
color:var(--text);

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:16px;

transition:background .3s;

}

/* CONTAINER */

.container{

width:100%;
max-width:420px;

background:var(--card);

border-radius:18px;

padding:28px 22px 26px;

box-shadow:
0 0 20px rgba(0,245,255,.08),
0 10px 35px rgba(0,0,0,.45);

text-align:center;

}

/* HEADER */

.header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:16px;

}

/* TITLE */

.title{

font-size:13px;
letter-spacing:1px;
text-transform:uppercase;
color:var(--soft);

}

/* THEME BUTTON */

.theme-btn{

background:none;
border:1px solid rgba(255,255,255,.15);
color:var(--text);

border-radius:8px;

padding:6px 10px;

font-size:12px;

cursor:pointer;

}

/* WORD */

.word{

font-size:36px;
font-weight:800;

margin-bottom:12px;

letter-spacing:1px;

color:var(--text);

text-shadow:0 0 12px rgba(0,245,255,.3);

}

/* RANK */

.rank{
margin-bottom:24px;
}

/* THOUSANDS PART */

.k-part{

font-size:46px;
font-weight:900;

color:var(--neon);

text-shadow:
0 0 8px var(--neon),
0 0 18px rgba(0,245,255,.7);

}

/* REMAINDER PART */

.rest-part{

font-size:24px;
font-weight:800;

margin-left:6px;

color:var(--neon2);

text-shadow:
0 0 6px var(--neon2),
0 0 14px rgba(255,43,214,.7);

}

/* DEFINITION CARD */

.definition-card{

background:rgba(255,255,255,.03);

border-radius:14px;

padding:20px 18px;

margin-bottom:26px;

border:1px solid rgba(255,255,255,.06);

text-align:left;

}

/* FINAL WORD */

.final-word{

font-weight:700;
margin-bottom:12px;

color:var(--neon2);

font-size:16px;

}

/* DEFINITIONS */

.definition{

font-size:15px;
line-height:1.6;

margin:10px 0;

display:flex;
gap:8px;

color:var(--text);

}

/* BULLET MARKER */

.definition::before{

content:"◆";

color:var(--neon2);

font-size:12px;

margin-top:6px;

}

/* BUTTON */

button{

width:100%;

border:none;

border-radius:12px;

padding:16px;

font-size:17px;
font-weight:700;

cursor:pointer;

color:white;

background:linear-gradient(
135deg,
#00f5ff,
#ff2bd6
);

box-shadow:
0 0 10px rgba(0,245,255,.8),
0 0 20px rgba(255,43,214,.5),
0 6px 20px rgba(0,0,0,.5);

transition:all .15s;

}

/* BUTTON HOVER */

button:hover{

transform:translateY(-2px);

box-shadow:
0 0 14px rgba(0,245,255,1),
0 0 28px rgba(255,43,214,.7);

}

/* BUTTON PRESS */

button:active{
transform:scale(.97);
}

/* MOBILE */

@media (max-width:420px){

.word{font-size:32px;}

.k-part{font-size:40px;}

}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="title">Word Trainer</div>

<button class="theme-btn" onclick="toggleTheme()">☀︎ / 🌙</button>

</div>

<div id="word" class="word">Loading...</div>

<div id="rank" class="rank"></div>

<div id="definitionBox" class="definition-card"></div>

<button onclick="generateRandom()">🎲 NEW WORD</button>

</div>

<script>

const MIN_RANK = 10000;
const MAX_RANK = 11000;

let wordsData = {};
let definitions = [];
let filteredWords = [];

async function init(){

const wordsResponse = await fetch("words.json");
wordsData = await wordsResponse.json();

const defsResponse = await fetch("definitions.json");
definitions = await defsResponse.json();

filteredWords = Object.entries(wordsData)
.filter(([word,rank]) => rank >= MIN_RANK && rank <= MAX_RANK);

generateRandom();

}

/* FORMAT RANK */

function formatRank(rank){

const thousands = Math.floor(rank / 1000);
const remainder = rank % 1000;

if(remainder === 0){

return `
<span class="k-part">${thousands}K</span>
`;

}

return `
<span class="k-part">${thousands}K</span>
<span class="rest-part">${remainder}</span>
`;

}

/* FIND DEFINITION */

function findDefinition(word){

word = word.toUpperCase();

for(const item of definitions){

if(item.searched_word === word){
return item;
}

}

return null;

}

/* RANDOM WORD */

function generateRandom(){

const randomIndex = Math.floor(Math.random()*filteredWords.length);

const [word,rank] = filteredWords[randomIndex];

document.getElementById("word").textContent = word;

document.getElementById("rank").innerHTML = formatRank(rank);

const entry = findDefinition(word);

const box = document.getElementById("definitionBox");

if(entry){

const defs = entry.definition
.map(d => `<div class="definition">${d}</div>`)
.join("");

box.innerHTML = `
<div class="final-word">
${entry.final_word} :
</div>
${defs}
`;

}else{

box.innerHTML = `<div class="definition">Definition not available</div>`;

}

}

/* THEME TOGGLE */

function toggleTheme(){

document.body.classList.toggle("light");

}

/* INIT */

init();

</script>

</body>
</html>
