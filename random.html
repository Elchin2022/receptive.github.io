<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Word Definition Game</title>

<style>

:root{

--bg:#0b0f1a;
--card:#12182a;
--text:#e6ecff;

--neon:#00f7ff;
--neon2:#ff2cff;

--correct:#22ff88;
--wrong:#ff3c5f;

--button:#1e2642;

}

.light{

--bg:#f3f6ff;
--card:#ffffff;
--text:#1a2238;

--neon:#0066ff;
--neon2:#7c3cff;

--button:#e6ebff;

}

body{

margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;
padding:20px;

}

.container{

width:100%;
max-width:600px;

}

.card{

background:var(--card);

border-radius:20px;
padding:28px;

box-shadow:
0 0 20px rgba(0,247,255,.15),
0 0 40px rgba(255,44,255,.08);

}

.top{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;

}

.score{

font-weight:bold;
font-size:18px;

}

.theme{

cursor:pointer;
padding:8px 12px;
border-radius:10px;
background:var(--button);

}

.rank{

font-size:32px;
font-weight:700;
text-align:center;
margin-bottom:10px;

}

.rank span{

color:var(--neon);

}

.word{

font-size:42px;
font-weight:800;
text-align:center;
margin-bottom:25px;

letter-spacing:1px;

}

.options{

display:flex;
flex-direction:column;
gap:14px;

}

.option{

padding:16px;
border-radius:12px;
cursor:pointer;

border:2px solid transparent;

background:var(--button);

transition:.2s;

}

.option:hover{

transform:translateY(-2px);

}

.correct{

border:2px solid var(--correct);

box-shadow:0 0 12px var(--correct);

}

.wrong{

border:2px solid var(--wrong);

box-shadow:0 0 12px var(--wrong);

}

.result{

text-align:center;

}

.finalWord{

font-weight:700;
margin-top:12px;

}

.definitions{

margin-top:15px;
text-align:left;

}

.definitions div{

margin-bottom:10px;

}

.retry{

margin-top:25px;

background:linear-gradient(45deg,var(--neon),var(--neon2));

color:#000;

border:none;

padding:14px 22px;

font-weight:bold;

border-radius:14px;

cursor:pointer;

font-size:16px;

}

@media (max-width:600px){

.word{

font-size:34px;

}

.rank{

font-size:24px;

}

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="top">

<div class="score">Score: <span id="score">0</span></div>

<div class="theme" onclick="toggleTheme()">🌙</div>

</div>

<div id="game">

<div class="rank" id="rank"></div>

<div class="word" id="word"></div>

<div class="options" id="options"></div>

</div>

<div id="result" class="result" style="display:none">

<h2 id="resultWord"></h2>

<div class="finalWord" id="finalWord"></div>

<div class="definitions" id="definitions"></div>

<div style="margin-top:15px">Score: <b id="finalScore"></b></div>

<button class="retry" onclick="restart()">Retry</button>

</div>

</div>

</div>

<script>

let words=[]
let definitions=[]

let currentWord=null
let score=0

const MIN=10000
const MAX=11000

async function init(){

const w=await fetch("../words.json")
words=await w.json()

const d=await fetch("../definitions.json")
definitions=await d.json()

nextWord()

}

function formatRank(num){

const thousands=Math.floor(num/1000)
const rest=num%1000

return `${thousands}K <span>${rest}</span>`

}

function randomIndex(){

return Math.floor(Math.random()*(MAX-MIN))+MIN

}

function nextWord(){

document.getElementById("result").style.display="none"
document.getElementById("game").style.display="block"

let i=randomIndex()

currentWord=words[i]

document.getElementById("rank").innerHTML=formatRank(i)
document.getElementById("word").innerText=currentWord

generateOptions(currentWord)

}

function findDefinition(word){

return definitions.find(d=>d.searched_word===word)

}

function generateOptions(word){

let correct=findDefinition(word)

if(!correct){

nextWord()
return

}

let options=[correct.definition[0]]

while(options.length<4){

let rand=definitions[Math.floor(Math.random()*definitions.length)]

let def=rand.definition[0]

if(!options.includes(def)){

options.push(def)

}

}

options=options.sort(()=>Math.random()-0.5)

renderOptions(options,correct.definition)

}

function renderOptions(options,correctDefs){

const container=document.getElementById("options")

container.innerHTML=""

options.forEach(def=>{

let div=document.createElement("div")

div.className="option"
div.innerText=def

div.onclick=()=>choose(div,def,correctDefs)

container.appendChild(div)

})

}

function choose(el,def,correctDefs){

let all=document.querySelectorAll(".option")

all.forEach(o=>o.onclick=null)

if(correctDefs.includes(def)){

el.classList.add("correct")

score++
document.getElementById("score").innerText=score

setTimeout(nextWord,900)

}else{

el.classList.add("wrong")

all.forEach(o=>{

if(correctDefs.includes(o.innerText)){

o.classList.add("correct")

}

})

setTimeout(showResult,1200)

}

}

function showResult(){

const entry=findDefinition(currentWord)

document.getElementById("game").style.display="none"
document.getElementById("result").style.display="block"

document.getElementById("resultWord").innerText=currentWord

document.getElementById("finalWord").innerText=entry.final_word

const defs=document.getElementById("definitions")
defs.innerHTML=""

entry.definition.forEach(d=>{

let div=document.createElement("div")
div.innerHTML="• "+d
defs.appendChild(div)

})

document.getElementById("finalScore").innerText=score

score=0
document.getElementById("score").innerText=0

}

function restart(){

nextWord()

}

function toggleTheme(){

document.body.classList.toggle("light")

}

init()

</script>

</body>
</html>
