<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Random Word</title>

<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
  }

  .word {
    font-size: 36px;
    margin-bottom: 20px;
  }

  .rank-container {
    font-weight: bold;
    line-height: 1.1;
    margin-bottom: 20px;
  }

  .k-part {
    font-size: 48px;
    color: #cc7722;
  }

  .rest-part {
    font-size: 24px;
  }

  button {
    padding: 8px 16px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div id="container">Loading...</div>

<script>
  const container = document.getElementById("container");

  function formatRank(rank) {
    if (rank >= 1000) {
      const thousands = Math.floor(rank / 1000);
      const remainder = rank % 1000;

      if (remainder === 0) {
        return `
          <div class="rank-container">
            <span class="k-part">${thousands}K</span>
          </div>
        `;
      }

      return `
        <div class="rank-container">
          <span class="k-part">${thousands}K</span>
          <span class="rest-part"> ${remainder}</span>
        </div>
      `;
    }

    return `
      <div class="rank-container">
        <span class="k-part">${rank}</span>
      </div>
    `;
  }

  function getRandomWord(data) {
    const filtered = Object.entries(data)
      .filter(([word, rank]) => rank >= 10000 && rank <= 20000);

    if (filtered.length === 0) return null;

    const randomIndex = Math.floor(Math.random() * filtered.length);
    return filtered[randomIndex];
  }

  function render(data) {
    const result = getRandomWord(data);

    if (!result) {
      container.innerHTML = "No words found in that range.";
      return;
    }

    const [word, rank] = result;

    container.innerHTML = `
      <div class="word">${word}</div>
      ${formatRank(rank)}
      <button onclick="render(wordsData)">New Random Word</button>
    `;
  }

  let wordsData = {};

  fetch("words.json")
    .then(res => res.json())
    .then(data => {
      wordsData = data;
      render(wordsData);
    });
</script>

</body>
</html>
