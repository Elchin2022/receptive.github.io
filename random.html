<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Word Generator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 600px;
      width: 90%;
      text-align: center;
    }

    .word {
      font-size: 42px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .rank {
      font-size: 28px;
      margin-bottom: 25px;
    }

    .k-part {
      font-size: 32px;
      font-weight: bold;
    }

    .rest-part {
      font-size: 20px;
      opacity: 0.7;
    }

    .definition-card {
      margin-top: 20px;
      padding: 20px;
      border-top: 1px solid #eee;
      text-align: left;
    }

    .part-of-speech {
      font-size: 14px;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 8px;
    }

    .definition-text {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .example {
      font-style: italic;
      opacity: 0.8;
      font-size: 14px;
    }

    .loading {
      opacity: 0.6;
    }

    .error {
      color: #999;
    }

    button {
      margin-top: 25px;
      padding: 10px 18px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
    }

    button:hover {
      opacity: 0.85;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="word" id="word"></div>
    <div class="rank" id="rank"></div>

    <div id="definition-container" class="definition-card"></div>

    <button onclick="generateRandomWord()">Next Word</button>
  </div>

  <script>
    const MIN = 10000;
    const MAX = 15000;

    let wordsData = {};
    const definitionCache = {};

    async function loadWords() {
      const response = await fetch("words.json");
      wordsData = await response.json();
      generateRandomWord();
    }

    function formatRank(rank) {
      const thousands = Math.floor(rank / 1000);
      const remainder = rank % 1000;

      if (thousands === 0) {
        return rank;
      }

      if (remainder === 0) {
        return `<span class="k-part">${thousands}K</span>`;
      }

      return `
        <span class="k-part">${thousands}K</span>
        <span class="rest-part"> ${remainder}</span>
      `;
    }

    function generateRandomWord() {
      const filtered = Object.entries(wordsData)
        .filter(([word, rank]) => rank >= MIN && rank <= MAX);

      if (filtered.length === 0) return;

      const randomIndex = Math.floor(Math.random() * filtered.length);
      const [word, rank] = filtered[randomIndex];

      document.getElementById("word").textContent = word;
      document.getElementById("rank").innerHTML = formatRank(rank);

      fetchDefinition(word);
    }

    async function fetchDefinition(word) {
      const container = document.getElementById("definition-container");

      if (definitionCache[word]) {
        renderDefinition(definitionCache[word]);
        return;
      }

      container.innerHTML = "<p class='loading'>Loading definition...</p>";

      try {
        const response = await fetch(
          `https://api.dictionaryapi.dev/api/v2/entries/en/${word}`
        );

        if (!response.ok) {
          throw new Error("Not found");
        }

        const data = await response.json();
        definitionCache[word] = data;
        renderDefinition(data);

      } catch (error) {
        container.innerHTML =
          "<p class='error'>Definition not available.</p>";
      }
    }

    function renderDefinition(data) {
      const container = document.getElementById("definition-container");

      const entry = data[0];
      const meaning = entry.meanings[0];
      const definitionObj = meaning.definitions[0];

      const partOfSpeech = meaning.partOfSpeech;
      const definition = definitionObj.definition;
      const example = definitionObj.example;

      container.innerHTML = `
        <div class="part-of-speech">${partOfSpeech}</div>
        <div class="definition-text">${definition}</div>
        ${example ? `<div class="example">"${example}"</div>` : ""}
      `;
    }

    loadWords();
  </script>
</body>
</html>
