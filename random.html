<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Random Word Generator</title>

<style>
:root {
  --bg1: #0f0c29;
  --bg2: #302b63;
  --bg3: #24243e;
  --neon-blue: #00f5ff;
  --neon-pink: #ff00c8;
  --neon-purple: #8a2be2;
  --text-light: #ffffff;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: var(--text-light);
  padding: 20px;
}

.container {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  padding: 40px 30px;
  max-width: 650px;
  width: 100%;
  text-align: center;
  box-shadow: 0 0 40px rgba(0, 245, 255, 0.2);
  transition: 0.3s ease;
}

.word {
  font-size: 48px;
  font-weight: 800;
  margin-bottom: 15px;
  letter-spacing: 2px;
  text-transform: lowercase;
  background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.rank {
  margin-bottom: 30px;
}

.k-part {
  font-size: 34px;
  font-weight: bold;
  color: var(--neon-blue);
  text-shadow: 0 0 8px var(--neon-blue);
}

.rest-part {
  font-size: 22px;
  color: var(--neon-pink);
  text-shadow: 0 0 6px var(--neon-pink);
}

.definition-card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 14px;
  background: rgba(0, 0, 0, 0.35);
  border: 1px solid rgba(255, 255, 255, 0.1);
  text-align: left;
}

.part-of-speech {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--neon-purple);
  margin-bottom: 10px;
}

.definition-text {
  font-size: 16px;
  line-height: 1.6;
  margin-bottom: 10px;
}

.example {
  font-style: italic;
  font-size: 14px;
  opacity: 0.85;
  color: var(--neon-blue);
}

.loading {
  opacity: 0.7;
}

.error {
  color: #ff6b6b;
}

button {
  margin-top: 30px;
  padding: 12px 22px;
  font-size: 15px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  letter-spacing: 1px;
  background: linear-gradient(90deg, var(--neon-pink), var(--neon-blue));
  color: white;
  box-shadow: 0 0 15px rgba(255, 0, 200, 0.6);
  transition: 0.25s ease;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 25px rgba(0, 245, 255, 0.9);
}

@media (max-width: 600px) {
  .word {
    font-size: 36px;
  }

  .k-part {
    font-size: 26px;
  }

  .rest-part {
    font-size: 18px;
  }

  .container {
    padding: 30px 20px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="word" id="word"></div>
  <div class="rank" id="rank"></div>
  <div id="definition-container" class="definition-card"></div>
  <button onclick="generateRandomWord()">NEXT WORD</button>
</div>

<script>
const MIN = 10000;
const MAX = 15000;

let wordsData = {};
const definitionCache = {};

async function loadWords() {
  const response = await fetch("words.json");
  wordsData = await response.json();
  generateRandomWord();
}

function formatRank(rank) {
  const thousands = Math.floor(rank / 1000);
  const remainder = rank % 1000;

  if (thousands === 0) return rank;

  if (remainder === 0) {
    return `<span class="k-part">${thousands}K</span>`;
  }

  return `
    <span class="k-part">${thousands}K</span>
    <span class="rest-part"> ${remainder}</span>
  `;
}

function generateRandomWord() {
  const filtered = Object.entries(wordsData)
    .filter(([word, rank]) => rank >= MIN && rank <= MAX);

  if (!filtered.length) return;

  const randomIndex = Math.floor(Math.random() * filtered.length);
  const [word, rank] = filtered[randomIndex];

  document.getElementById("word").textContent = word;
  document.getElementById("rank").innerHTML = formatRank(rank);

  fetchDefinition(word);
}

async function fetchDefinition(word) {
  const container = document.getElementById("definition-container");

  if (definitionCache[word]) {
    renderDefinition(definitionCache[word]);
    return;
  }

  container.innerHTML = "<p class='loading'>Loading definition...</p>";

  try {
    const response = await fetch(
      `https://api.dictionaryapi.dev/api/v2/entries/en/${word}`
    );

    if (!response.ok) throw new Error();

    const data = await response.json();
    definitionCache[word] = data;
    renderDefinition(data);

  } catch {
    container.innerHTML =
      "<p class='error'>Definition not available.</p>";
  }
}

function renderDefinition(data) {
  const container = document.getElementById("definition-container");

  const entry = data[0];
  const meaning = entry.meanings[0];
  const definitionObj = meaning.definitions[0];

  container.innerHTML = `
    <div class="part-of-speech">${meaning.partOfSpeech}</div>
    <div class="definition-text">${definitionObj.definition}</div>
    ${definitionObj.example ? `<div class="example">"${definitionObj.example}"</div>` : ""}
  `;
}

loadWords();
</script>

</body>
</html>
