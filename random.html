<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Random Word</title>

<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
  }

  .word {
    font-size: 42px;
    font-weight: bold;
  }

  .rank {
    font-size: 20px;
    color: #777;
  }

  button {
    margin-top: 20px;
    padding: 8px 16px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div id="container">Loading...</div>

<script>
  const container = document.getElementById("container");

  function getRandomWord(data) {
    const filtered = Object.entries(data)
      .filter(([word, rank]) => rank >= 10000 && rank <= 20000);

    if (filtered.length === 0) return null;

    const randomIndex = Math.floor(Math.random() * filtered.length);
    return filtered[randomIndex];
  }

  function render(data) {
    const result = getRandomWord(data);

    if (!result) {
      container.innerHTML = "No words found in that range.";
      return;
    }

    const [word, rank] = result;

    container.innerHTML = `
      <div class="word">${word}</div>
      <div class="rank">Rank: ${rank}</div>
      <button onclick="render(wordsData)">New Random Word</button>
    `;
  }

  let wordsData = {};

  fetch("words.json")
    .then(res => res.json())
    .then(data => {
      wordsData = data;
      render(wordsData);
    });
</script>

</body>
</html>
