<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Word</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #1f2937, #111827);
    color: #f9fafb;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .card {
    background: #1e293b;
    padding: 40px 30px;
    border-radius: 20px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .word {
    font-size: 34px;
    font-weight: 600;
    margin-bottom: 25px;
    word-wrap: break-word;
  }

  .rank-container {
    font-weight: bold;
    line-height: 1.1;
    margin-bottom: 30px;
  }

  .k-part {
    font-size: 56px;
    color: #f59e0b;
  }

  .rest-part {
    font-size: 26px;
    color: #e5e7eb;
  }

  button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: #f59e0b;
    color: #111827;
    transition: all 0.2s ease;
  }

  button:hover {
    background: #fbbf24;
    transform: translateY(-2px);
  }

  button:active {
    transform: translateY(0);
  }

  @media (max-width: 480px) {
    .word {
      font-size: 28px;
    }

    .k-part {
      font-size: 44px;
    }

    .rest-part {
      font-size: 22px;
    }
  }
</style>
</head>

<body>

<div class="card" id="container">
  Loading...
</div>

<script>
  const container = document.getElementById("container");

  function formatRank(rank) {
    if (rank >= 1000) {
      const thousands = Math.floor(rank / 1000);
      const remainder = rank % 1000;

      if (remainder === 0) {
        return `
          <div class="rank-container">
            <span class="k-part">${thousands}K</span>
          </div>
        `;
      }

      return `
        <div class="rank-container">
          <span class="k-part">${thousands}K</span>
          <span class="rest-part"> ${remainder}</span>
        </div>
      `;
    }

    return `
      <div class="rank-container">
        <span class="k-part">${rank}</span>
      </div>
    `;
  }

  function getRandomWord(data) {
    const filtered = Object.entries(data)
      .filter(([word, rank]) => rank >= 10000 && rank <= 16000);

    if (filtered.length === 0) return null;

    const randomIndex = Math.floor(Math.random() * filtered.length);
    return filtered[randomIndex];
  }

  function render(data) {
    const result = getRandomWord(data);

    if (!result) {
      container.innerHTML = "No words found in that range.";
      return;
    }

    const [word, rank] = result;

    container.innerHTML = `
      <div class="word">${word}</div>
      ${formatRank(rank)}
      <button onclick="render(wordsData)">New Random Word</button>
    `;
  }

  let wordsData = {};

  fetch("words.json")
    .then(res => res.json())
    .then(data => {
      wordsData = data;
      render(wordsData);
    });
</script>

</body>
</html>
